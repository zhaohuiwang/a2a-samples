[project]
name = "itk-agents-v03"
version = "0.1.0"
description = "ITK v03 Agent Components"
requires-python = ">=3.11"
dependencies = [
    "a2a-sdk[grpc]==0.3.24",
    "httpx>=0.27.0",
    "fastapi",
    "uvicorn",
    "grpcio",
    "click",
]

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["."]


[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.ruff]
extend = "../../../../.ruff.toml"
# Exclude generated files
exclude = [
    "**/pyproto/*.py",
]

[tool.ruff.lint.isort]
known-first-party = ["a2a", "agents.python.v03.pyproto", "test_suite"]

