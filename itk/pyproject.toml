[project]
name = "itk"
version = "0.1.0"
description = "ITK Agent Interface and test orchestration"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "grpcio-tools>=1.60.0",
    "a2a-sdk[http-server]>=0.3.24",
    "httpx>=0.27.0",
    "fastapi>=0.110.0",
    "uvicorn>=0.29.0",
    "grpcio>=1.60.0",
    "grpcio-reflection>=1.60.0",
]

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["."]

[tool.uv]
workspace = { members = ["agents/python/v03"] }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "ruff>=0.15.5",
]

[tool.ruff]
extend = "../.ruff.toml"
# Exclude generated files
exclude = [
    "**/pyproto/*.py",
]

[tool.ruff.lint.isort]
known-first-party = ["a2a", "agents.python.v03.pyproto", "test_suite"]


