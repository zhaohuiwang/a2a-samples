[project]
name = "timestamp_ext"
version = "0.1.0"
description = "Hello world A2A extension impl"
readme = "README.md"
requires-python = ">=3.10"
dependencies = ["a2a-sdk>=1.0.0a3"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "a2a-sdk[grpc,http-server]>=1.0.0a3",
    "httpx>=0.28",
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
