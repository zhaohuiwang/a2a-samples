[project]
name = "signing_and_verifying"
version = "0.1.0"
description = "Signed agent example that only returns Messages"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "a2a-sdk[sqlite]>=1.0.0a0",
    "cryptography>=43.0.0",
    "fastapi>=0.115.0",
    "httpx>=0.28.1",
    "pydantic>=2.11.4",
    "PyJWT>=2.0.0",
    "python-dotenv>=1.1.0",
    "sse-starlette>=2.3.5",
    "starlette>=0.46.2",
    "uvicorn>=0.34.2",
    "packaging>=24.0",
]

[tool.hatch.build.targets.wheel]
packages = ["."]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.lint]
line-length = 110

[tool.ruff.lint]
ignore = ["E203"]

